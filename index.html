<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ee;color:#1a1a1a;min-height:100vh;}
.nav{background:#1a1a1a;display:flex;align-items:center;gap:10px;padding:0 16px;position:sticky;top:0;z-index:100;height:50px;}
.btn-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0;line-height:1;}
.nav-title{color:#fff;font-size:15px;font-weight:500;flex:1;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#888;flex-shrink:0;transition:background 0.3s;}
.sync-dot.ok{background:#4ade80;}.sync-dot.err{background:#f87171;}
.home{padding:1.5rem 1rem 2rem;}
.home-title{font-size:24px;font-weight:500;margin-bottom:4px;}
.home-sub{font-size:13px;color:#666;margin-bottom:1.5rem;}
.home-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.hbtn{border-radius:14px;padding:1.25rem;border:none;cursor:pointer;text-align:left;transition:transform 0.12s;width:100%;font-family:inherit;}
.hbtn:active{transform:scale(0.97);}
.hbtn-r{background:#185FA5;color:#fff;}.hbtn-d{background:#1a1a1a;color:#fff;}
.hbtn-h{background:#5b3fa5;color:#fff;width:100%;border-radius:14px;padding:1rem 1.25rem;border:none;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:12px;font-family:inherit;}
.hbtn-icon{font-size:22px;margin-bottom:8px;}
.hbtn-label{font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:2px;}
.hbtn-title{font-size:16px;font-weight:500;}
.card{background:#fff;border-radius:12px;padding:14px;border:1px solid #e5e5e5;margin-bottom:12px;}
.card.full{grid-column:1/-1;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.slabel{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;}
.sval{font-size:20px;font-weight:500;}
.sval.g{color:#2d7a2d;}.sval.r{color:#a32d2d;}.sval.b{color:#185FA5;}
.ssub{font-size:11px;color:#999;margin-top:2px;}
.prog-bg{height:8px;background:#f0f0ee;border-radius:99px;overflow:hidden;margin-top:8px;}
.prog-fill{height:100%;border-radius:99px;transition:width 0.4s;}
.day-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.day-card{border-radius:12px;overflow:hidden;border:1px solid #e5e5e5;}
.day-hdr{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.day-hdr-16{background:#185FA5;}.day-hdr-25{background:#BA7517;}
.day-hdr span{font-size:12px;font-weight:500;color:#fff;}
.day-body{background:#fff;padding:6px 0;}
.day-row{padding:5px 12px;display:flex;justify-content:space-between;font-size:11px;border-bottom:1px solid #f5f5f5;}
.day-row:last-child{border-bottom:none;}
.day-rl{color:#888;}.day-rv{font-weight:500;}
.day-rv.g{color:#2d7a2d;}.day-rv.r{color:#a32d2d;}
.chart-wrap{background:#fff;border-radius:12px;padding:14px;border:1px solid #e5e5e5;margin-bottom:12px;}
.chart-title{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:12px;}
.section{padding:0 1rem 2rem;}
.fcard{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;border:1px solid #e5e5e5;}
.ftitle{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;}
.field{margin-bottom:10px;}
label{font-size:12px;color:#666;display:block;margin-bottom:4px;}
input[type=text],input[type=number],select{width:100%;padding:9px 11px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#fafafa;color:#1a1a1a;font-family:inherit;outline:none;}
input:focus,select:focus{border-color:#999;box-shadow:0 0 0 3px rgba(0,0,0,0.06);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.dtoggle{display:flex;gap:8px;margin-bottom:10px;}
.dbtn{flex:1;padding:9px;font-size:13px;font-weight:500;border:2px solid #ddd;border-radius:8px;background:#f5f5f3;color:#888;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.dbtn-16.sel{background:#185FA5;border-color:#0C447C;color:#fff;}

.sub-prev{display:flex;align-items:center;justify-content:space-between;background:#f5f5f3;border-radius:8px;padding:10px 14px;margin-top:8px;}
.sub-prev span{font-size:12px;color:#666;}

.btn-add.r{background:#185FA5;}.btn-add.d{background:#1a1a1a;}
.btn-add:active{opacity:0.85;}.btn-add:disabled{opacity:0.5;cursor:not-allowed;}
.btn-fechar{width:100%;padding:11px;font-size:14px;font-weight:500;border:2px solid #5b3fa5;border-radius:8px;color:#5b3fa5;background:#fff;cursor:pointer;font-family:inherit;margin-top:8px;}
.btn-fechar:hover{background:#5b3fa5;color:#fff;}
.litem{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:0.9rem 1.1rem;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.lname{font-size:13px;font-weight:500;}
.lmeta{font-size:11px;color:#888;margin-top:2px;}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;margin-left:5px;vertical-align:middle;}
.badge-16{background:#185FA5;color:#fff;}.badge-25{background:#BA7517;color:#fff;}
.lval{font-size:13px;font-weight:500;white-space:nowrap;}
.bdel{background:none;border:none;cursor:pointer;font-size:14px;color:#ccc;padding:0 0 0 6px;}

.delta-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.dbox{border-radius:8px;padding:11px 14px;}
.dbox.n{background:#f5f5f3;}.dbox.p{background:#eaf3de;}.dbox.ng{background:#fcebeb;}
.dlabel{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;}
.dbox.n .dlabel,.dbox.n .dval,.dbox.n .dsub{color:#888;}
.dbox.p .dlabel,.dbox.p .dval,.dbox.p .dsub{color:#3b6d11;}

.dval{font-size:15px;font-weight:500;}.dsub{font-size:10px;margin-top:2px;}

.hist-del:hover{border-color:#e24b4a;color:#e24b4a;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;}
.modal-box{background:#fff;border-radius:16px 16px 0 0;padding:1.5rem 1rem;width:100%;}
.modal-title{font-size:16px;font-weight:500;margin-bottom:6px;}
.modal-sub{font-size:13px;color:#666;margin-bottom:1.25rem;}
.modal-actions{display:flex;gap:10px;margin-top:1rem;}
.mbtn{flex:1;padding:11px;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;font-family:inherit;border:none;}
.mbtn-c{background:#f0f0ee;color:#666;}.mbtn-ok{background:#5b3fa5;color:#fff;}
.loading{text-align:center;padding:2rem;font-size:13px;color:#888;}
.hidden{display:none!important;}
.cat-bar-wrap{margin-bottom:4px;}
.cat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.cat-bar-label{font-size:12px;color:#1a1a1a;min-width:90px;}
.cat-bar-bg{flex:1;height:8px;background:#f0f0ee;border-radius:99px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:99px;}
.cat-bar-val{font-size:11px;color:#888;min-width:80px;text-align:right;}
</style>
</head>

<script>
var firebaseConfig={
  apiKey:"AIzaSyD_t1nhaoYlqTjOehAaGJyNpPfNt7Uv92g",
  authDomain:"financeiro-f8dda.firebaseapp.com",
  projectId:"financeiro-f8dda",
  storageBucket:"financeiro-f8dda.firebasestorage.app",
  messagingSenderId:"210397672861",
  appId:"1:210397672861:web:d5f6a6207b26f4b95aeb74"
};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();

var receitas=[],despesas=[],historico=[],rDate=16,dDate=16,modalTipo='',viewMode='dia',saveMetaTimer=null;

// ── Estado de collapse: inicializado UMA VEZ, preservado entre re-renders ──
if(!window.dMesOpen) window.dMesOpen={};
if(!window.rMesOpen) window.rMesOpen={};
if(!window.mesOpen)  window.mesOpen={};
if(!window.catOpen)  window.catOpen={};

var CATS_EMOJI={Moradia:'🏠',Saúde:'❤️',Transporte:'🚗',Educação:'📚',Alimentação:'🍽️',Pessoal:'👤',Financeiro:'💳',Família:'👨‍👩‍👧',Serviços:'⚡',Outros:'📦'};
var CAT_ORDER=['Moradia','Saúde','Transporte','Educação','Alimentação','Pessoal','Financeiro','Família','Serviços','Outros'];
var CAT_COLORS={Moradia:'#4a5568',Saúde:'#718096',Transporte:'#a0aec0',Educação:'#2d3748',Alimentação:'#606978',Pessoal:'#8a9bb0',Financeiro:'#1a202c',Família:'#697080',Serviços:'#556275',Outros:'#b0bcc8'};
var CAT_MAP={
  'Saúde':'Saúde','FIES':'Educação','Dentista':'Saúde','Seguro carro':'Transporte',
  'Água':'Serviços','Carro':'Transporte','Contabilidade':'Financeiro','Mãe':'Outros',
  'Nubank Isma':'Financeiro','Baba salário':'Família','Baba faxina':'Família',
  'Internet':'Serviços','Cartão inter':'Financeiro','Aluguel':'Moradia',
  'Imposto':'Financeiro','Aniver Isaac':'Família','Parcela c&a':'Pessoal',
  'Cartão mãe nu':'Financeiro','Cartão mãe nubank':'Financeiro'
};

function setSynced(ok){document.getElementById('sync-dot').className='sync-dot '+(ok?'ok':'err');}
function fmt(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function calcSub(t,h,d){return(parseFloat(t)||0)*(parseFloat(h)||0)*(parseFloat(d)||0);}
function getTotalR(){return receitas.reduce(function(a,p){return a+p.sub;},0);}
function getTotalD(){return despesas.reduce(function(a,p){return a+p.valor;},0);}
function getCat(p){return p.cat||(CAT_MAP[p.desc]||'Outros');}

function atualizarCategorias(lista){
  lista.forEach(function(p){
    if(!p.cat&&CAT_MAP[p.desc]){
      db.collection('despesas').doc(p.id).update({cat:CAT_MAP[p.desc]}).catch(function(){});
    }
  });
}

function toggleCat(key){
  window.catOpen[key]=!window.catOpen[key];
  var body=document.getElementById('body-'+key);
  var arr=document.getElementById('arr-'+key);
  if(body){body.style.display=window.catOpen[key]?'block':'none';}

// Event delegation
document.addEventListener('click',function(e){
  // ── FIX: botão Pagar com stopPropagation para não colapsar mês pai ──
  var btnp=e.target.closest('[data-pid]');
  if(btnp){
    e.stopPropagation();
    var pid=btnp.getAttribute('data-pid');
    var pagaAtual=btnp.getAttribute('data-paga')==='true';
    if(pid) togglePaga(pid, pagaAtual);
    return;
  }

  var hdr=e.target.closest('[data-catkey]');
  if(hdr){var key=hdr.getAttribute('data-catkey');if(key)toggleCat(key);}

  var brea=e.target.closest('[data-reabrir]');
  if(brea){e.stopPropagation();var rid=brea.getAttribute('data-reabrir');var rtipo=brea.getAttribute('data-tipo');var rmes=brea.getAttribute('data-mes');var rano=brea.getAttribute('data-ano');if(rid)reabrirMes(rid,rtipo,rmes,rano);return;}

  var brem=e.target.closest('[data-remover]');
  if(brem){e.stopPropagation();var remid=brem.getAttribute('data-remover');if(remid)removeHistorico(remid);return;}

  var rdel=e.target.closest('[data-rid]');
  if(rdel){e.stopPropagation();var rid=rdel.getAttribute('data-rid');if(rid)removeReceita(rid);return;}

  var ddel=e.target.closest('[data-did]');
  if(ddel){e.stopPropagation();var did=ddel.getAttribute('data-did');if(did)removeDespesa(did);return;}

  var bmk=e.target.closest('[data-meskey]');
  if(bmk){var mk=bmk.getAttribute('data-meskey');if(mk)toggleMesHome(mk);}

  // Toggle mês receitas
  var brm=e.target.closest('[data-rmes]');
  if(brm){
    var rmk=brm.getAttribute('data-rmes');
    window.rMesOpen[rmk]=window.rMesOpen[rmk]===false?true:false;
    var rb=document.getElementById('body-'+rmk);
    var ra=document.getElementById('arr-'+rmk);
    if(rb) rb.style.display=window.rMesOpen[rmk]===false?'none':'block';
    if(ra) ra.textContent=window.rMesOpen[rmk]===false?'▼':'▲';
  }

  // Toggle mês despesas
  var bdm=e.target.closest('[data-dmes]');
  if(bdm){
    var dmk=bdm.getAttribute('data-dmes');
    window.dMesOpen[dmk]=window.dMesOpen[dmk]===false?true:false;
    var db2=document.getElementById('body-'+dmk);
    var da=document.getElementById('arr-'+dmk);
    if(db2) db2.style.display=window.dMesOpen[dmk]===false?'none':'block';
    if(da) da.textContent=window.dMesOpen[dmk]===false?'▼':'▲';
  }
});

function saveMeta(){
  updateMeta();
  clearTimeout(saveMetaTimer);
  saveMetaTimer=setTimeout(function(){
    var meta=parseFloat(document.getElementById('r-meta').value)||0;
    var taxaExtra=parseFloat(document.getElementById('r-taxa-extra').value)||0;
    var metaMes=document.getElementById('meta-mes').value;
    db.collection('config').doc('meta').set({meta:meta,taxaExtra:taxaExtra,metaMes:metaMes})
    .then(function(){setSynced(true);}).catch(function(){setSynced(false);});
  },800);

function updateMeta(){
  var meta=parseFloat(document.getElementById('r-meta').value)||0;
  var taxaExtra=parseFloat(document.getElementById('r-taxa-extra').value)||0;
  var metaMes=document.getElementById('meta-mes')?document.getElementById('meta-mes').value:'';
  var receitasFiltradas=metaMes?receitas.filter(function(p){return p.mes===metaMes;}):receitas;
  var total=receitasFiltradas.reduce(function(a,p){return a+p.sub;},0);
  var lbl=document.getElementById('meta-mes-label');
  if(lbl) lbl.textContent=metaMes?'('+metaMes+')':'(todos)';
  var vr=document.getElementById('r-val-receita');
  if(vr) vr.textContent=fmt(total);
  var dr=document.getElementById('r-delta-row');
  if(!meta){dr.style.display='none';return;}
  dr.style.display='block';
  var delta=meta-total,atingiu=delta<=0;
  var pct=Math.min(100,(total/meta*100));
  document.getElementById('r-box-delta').className='dbox '+(atingiu?'p':'ng');
  document.getElementById('r-val-delta').textContent=fmt(Math.abs(delta));
  document.getElementById('r-sub-delta').textContent=atingiu?'acima da meta':'faltando';
  document.getElementById('r-pct-label').textContent=pct.toFixed(1)+'%';
  var bar=document.getElementById('r-pct-bar');
  bar.style.width=pct.toFixed(1)+'%';
  bar.style.background=atingiu?'#2d7a2d':(pct>=75?'#BA7517':'#185FA5');
  var bx=document.getElementById('r-box-extra');
  if(!atingiu&&taxaExtra>0){bx.className='dbox ng';document.getElementById('r-val-extra').textContent=(delta/taxaExtra).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'h';document.getElementById('r-sub-extra').textContent='a R$'+taxaExtra.toLocaleString('pt-BR',{minimumFractionDigits:2})+'/h';}
  else if(atingiu){bx.className='dbox p';document.getElementById('r-val-extra').textContent='Meta atingida';document.getElementById('r-sub-extra').textContent='';}
  else{bx.className='dbox n';document.getElementById('r-val-extra').textContent='—';document.getElementById('r-sub-extra').textContent='informe taxa extra';}
}

function addReceita(){
  var desc=document.getElementById('r-desc').value.trim();
  var taxa=parseFloat(document.getElementById('r-taxa').value)||0;
  var horas=parseFloat(document.getElementById('r-horas').value)||0;
  var dias=parseInt(document.getElementById('r-dias').value)||0;
  var mes=document.getElementById('r-mes').value;
  var ano=document.getElementById('r-ano').value;
  if(!desc){document.getElementById('r-desc').focus();return;}
  if(!taxa||!horas||!dias){alert('Preencha taxa, horas e dias.');return;}
  if(!mes){alert('Selecione o mês da receita.');document.getElementById('r-mes').focus();return;}
  var btn=document.getElementById('r-btn-add');btn.disabled=true;
  db.collection('receitas').add({desc:desc,taxa:taxa,horas:horas,dias:dias,sub:calcSub(taxa,horas,dias),date:rDate,mes:mes,ano:ano,criadoEm:firebase.firestore.FieldValue.serverTimestamp()})
  .then(function(){
    ['r-desc','r-taxa','r-horas','r-dias'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('r-preview').textContent='R$ 0,00';
    document.getElementById('r-desc').focus();setSynced(true);
  }).catch(function(e){setSynced(false);alert('Erro: '+e.message);})
  .finally(function(){btn.disabled=false;});
}

function addDespesa(){
  var desc=document.getElementById('d-desc').value.trim();
  var cat=document.getElementById('d-cat').value||'Outros';
  var valor=parseFloat(document.getElementById('d-valor').value)||0;
  var mes=document.getElementById('d-mes').value;
  var ano=document.getElementById('d-ano').value;
  if(!desc){document.getElementById('d-desc').focus();return;}
  if(!valor){alert('Informe o valor.');return;}
  if(!mes){alert('Selecione o mês da despesa.');document.getElementById('d-mes').focus();return;}
  var btn=document.getElementById('d-btn-add');btn.disabled=true;
  db.collection('despesas').add({desc:desc,cat:cat,valor:valor,date:dDate,mes:mes,ano:ano,criadoEm:firebase.firestore.FieldValue.serverTimestamp()})
  .then(function(){
    ['d-desc','d-valor'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('d-cat').value='';
    document.getElementById('d-desc').focus();setSynced(true);
    enviarWhatsApp('Nova despesa cadastrada: '+cat+', '+desc+' — '+fmt(valor)+(mes?' ('+mes+(ano?' '+ano:'')+'）':''));
  }).catch(function(e){setSynced(false);alert('Erro: '+e.message);})
  .finally(function(){btn.disabled=false;});
}

function confirmarFechamento(){
  var mes=document.getElementById('modal-mes').value;
  var ano=document.getElementById('modal-ano').value;
  if(!mes||!ano){alert('Selecione mês e ano.');return;}
  var btn=document.getElementById('modal-confirm-btn');btn.disabled=true;
  var itensFiltrados=modalTipo==='receita'
    ?receitas.filter(function(p){return p.mes===mes&&String(p.ano)===String(ano);})
        .map(function(p){return{desc:p.desc,valor:p.sub,taxa:p.taxa,horas:p.horas,dias:p.dias,date:p.date};})
    :despesas.filter(function(p){return p.mes===mes&&String(p.ano)===String(ano)&&p.paga===true;})
        .map(function(p){return{desc:p.desc,cat:getCat(p),valor:p.valor,date:p.date};});
  if(!itensFiltrados.length){
    var msg=modalTipo==='despesa'
      ?'Nenhuma despesa PAGA encontrada para '+mes+' '+ano+'. Marque as despesas como pagas antes de fechar.'
      :'Nenhum lançamento encontrado para '+mes+' '+ano+'.';
    alert(msg);btn.disabled=false;return;
  }
  var total=itensFiltrados.reduce(function(a,p){return a+p.valor;},0);
  var existente=historico.find(function(h){return h.tipo===modalTipo&&h.mes===mes&&String(h.ano)===String(ano);});
  var promise=existente
    ?db.collection('historico').doc(existente.id).set({tipo:modalTipo,mes:mes,ano:ano,itens:itensFiltrados,total:total,criadoEm:firebase.firestore.FieldValue.serverTimestamp()})
    :db.collection('historico').add({tipo:modalTipo,mes:mes,ano:ano,itens:itensFiltrados,total:total,criadoEm:firebase.firestore.FieldValue.serverTimestamp()});
  promise
  .then(function(){setSynced(true);fecharModal();alert((existente?'Fechamento atualizado':'Mês fechado')+' com sucesso! '+itensFiltrados.length+' lançamento(s) de '+mes+' '+ano+'.');})
  .catch(function(e){setSynced(false);alert('Erro: '+e.message);})
  .finally(function(){btn.disabled=false;});
}

function renderReceitas(){
  var el=document.getElementById('r-list');
  if(!receitas.length){el.innerHTML='<div class="empty">Nenhuma receita adicionada.</div>';updateMeta();return;}
  var MLIST=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var grupos={},ordemGrupos=[];
  receitas.forEach(function(p){
    var k=(p.mes||'Sem mês')+'|'+String(p.ano||'');
    if(!grupos[k]){grupos[k]={mes:p.mes||'Sem mês',ano:p.ano||'',d16:[],d25:[]};ordemGrupos.push(k);}
    if(p.date===25) grupos[k].d25.push(p); else grupos[k].d16.push(p);
  });
  var mesesFechadosR={};
  historico.forEach(function(h){if(h.tipo==='receita') mesesFechadosR[h.mes+'|'+String(h.ano)]=true;});
  ordemGrupos=ordemGrupos.filter(function(k){return !mesesFechadosR[k];});
  ordemGrupos.sort(function(a,b){
    var ga=grupos[a],gb=grupos[b];
    return (parseInt(ga.ano||0)*12+MLIST.indexOf(ga.mes))-(parseInt(gb.ano||0)*12+MLIST.indexOf(gb.mes));
  });
  function itemHtml(p){
    var th=(p.horas*p.dias).toLocaleString('pt-BR',{maximumFractionDigits:1});
    var btn='<button class="bdel" data-rid="'+p.id+'">✕</button>';
    return'<div class="litem"><div style="flex:1;min-width:0">'
      +'<div class="lname">'+p.desc+'</div>'
      +'<div class="lmeta">R$'+p.taxa.toLocaleString('pt-BR',{minimumFractionDigits:2})+'/h · '+p.horas+'h/dia · '+p.dias+'d · '+th+'h</div>'
      +'</div><div style="display:flex;align-items:center;gap:4px">'
      +'<span class="lval">'+fmt(p.sub)+'</span>'+btn
      +'</div></div>';
  }
  var html='';
  ordemGrupos.forEach(function(key){
    var g=grupos[key];
    var label=g.mes+(g.ano?' '+g.ano:'');
    var totalMes=(g.d16.concat(g.d25)).reduce(function(a,p){return a+p.sub;},0);
    var t16=g.d16.reduce(function(a,p){return a+p.sub;},0);
    var t25=g.d25.reduce(function(a,p){return a+p.sub;},0);
    var mk='rmes-'+key.replace(/[^a-zA-Z0-9]/g,'');
    var isOpen=window.rMesOpen[mk]!==false;
    html+='<div style="background:#fff;border:1px solid #e5e5e5;border-radius:12px;margin-bottom:10px;overflow:hidden;">';
    html+='<div data-rmes="'+mk+'" style="background:#f5f5f3;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;">'
      +'<span style="font-size:13px;font-weight:500;color:#1a1a1a;">📅 '+label+'</span>'
      +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<span style="font-size:13px;font-weight:500;color:#185FA5;">'+fmt(totalMes)+'</span>'
        +'<span id="arr-'+mk+'" style="font-size:11px;color:#888;">'+(isOpen?'▲':'▼')+'</span>'
      +'</div>'
    +'</div>';
    html+='<div id="body-'+mk+'" style="display:'+(isOpen?'block':'none')+'">';
    if(g.d16.length){
      html+='<div style="background:#4a5568;padding:9px 14px;display:flex;justify-content:space-between;"><span style="color:#fff;font-size:13px;font-weight:500;">Dia 16</span><span style="color:#fff;font-size:13px;">'+fmt(t16)+'</span></div>';
      html+=g.d16.map(itemHtml).join('');
    }
    if(g.d25.length){
      html+='<div style="background:#718096;padding:9px 14px;display:flex;justify-content:space-between;"><span style="color:#fff;font-size:13px;font-weight:500;">Dia 25</span><span style="color:#fff;font-size:13px;">'+fmt(t25)+'</span></div>';
      html+=g.d25.map(itemHtml).join('');
    }
    html+='</div></div>';
  });
  el.innerHTML=html;
  updateMeta();
}

        html+='<div style="background:#4a5568;padding:9px 14px;display:flex;justify-content:space-between;"><span style="color:#fff;font-size:13px;font-weight:500;">Dia 16</span><span style="color:#fff;font-size:13px;">'+fmt(t16)+'</span></div>';
        html+=g.d16.map(itemHtml).join('');
      }
      if(g.d25.length){
        html+='<div style="background:#718096;padding:9px 14px;display:flex;justify-content:space-between;"><span style="color:#fff;font-size:13px;font-weight:500;">Dia 25</span><span style="color:#fff;font-size:13px;">'+fmt(t25)+'</span></div>';
        html+=g.d25.map(itemHtml).join('');
      }
      html+='</div></div>';
    });
  } else {
    var mGrupos={},mOrdem=[];

      mGrupos[mk2].cats[cat].push(p);
    });
    mOrdem.sort(function(a,b){
      var ga=mGrupos[a],gb=mGrupos[b];

    });
    mOrdem.forEach(function(mk2){
      var gm=mGrupos[mk2];
      var label=gm.mes+(gm.ano?' '+gm.ano:'');
      var totalMes=Object.keys(gm.cats).reduce(function(a,c){return a+gm.cats[c].reduce(function(b,p){return b+p.valor;},0);},0);

        +'</div>'
      +'</div>';
      html+='<div id="body-'+dmk+'" style="display:'+(isOpen?'block':'none')+'">';
      var allCats=CAT_ORDER.filter(function(c){return gm.cats[c];});
      Object.keys(gm.cats).forEach(function(c){if(CAT_ORDER.indexOf(c)<0)allCats.push(c);});
      allCats.forEach(function(cat){
        var itens=gm.cats[cat];
        var tot=itens.reduce(function(a,p){return a+p.valor;},0);
        var pct=totalMes>0?(tot/totalMes*100).toFixed(1):'0.0';
        var emoji=CATS_EMOJI[cat]||'📦';
        var catKey='cat-'+mk2.replace(/[^a-zA-Z0-9]/g,'')+cat.replace(/[^a-zA-Z]/g,'');
        var isCatOpen=window.catOpen[catKey];
        html+='<div style="background:#fff;border-top:1px solid #f0f0f0;">';
        html+='<div data-catkey="'+catKey+'" style="padding:9px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:#fafafa;">'
          +'<span style="font-size:13px;font-weight:500;color:#1a1a1a;">'+emoji+' '+cat+'</span>'
          +'<div style="display:flex;align-items:center;gap:8px;">'
            +'<span style="font-size:13px;font-weight:500;color:#a32d2d;">'+fmt(tot)+'</span>'
            +'<span style="font-size:11px;color:#888;background:#e5e5e5;border-radius:99px;padding:2px 7px;">'+pct+'%</span>'
            +'<span id="arr-'+catKey+'" style="font-size:11px;color:#888;">'+(isCatOpen?'▲':'▼')+'</span>'
          +'</div>'
        +'</div>';
        html+='<div id="body-'+catKey+'" style="display:'+(isCatOpen?'block':'none')+';">'+itens.map(itemHtml).join('')+'</div>';
        html+='</div>';
      });
      html+='</div></div>';
    });
  }

  html+='<div class="dtotal-bar"><span>Total de despesas</span><span>'+fmt(total)+'</span></div>';
  el.innerHTML=html;
}

function toggleMes(key){

function renderHistorico(){
  var el=document.getElementById('hist-list');
  if(!historico.length){el.innerHTML='<div class="empty" style="background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:2rem">Nenhum mês fechado ainda.</div>';return;}
  var MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  var grupos={};
  historico.forEach(function(h){
    var key=h.mes+'|'+h.ano;
    if(!grupos[key])grupos[key]={mes:h.mes,ano:h.ano,receitas:[],despesas:[]};
    if(h.tipo==='receita')grupos[key].receitas.push(h);
    else grupos[key].despesas.push(h);
  });
  var porAno={};

    else porAno[ano].d+=h.total;
  });
  var anosOrd=Object.keys(porAno).sort(function(a,b){return parseInt(b)-parseInt(a);});
  var anoHtml=anosOrd.map(function(ano){
    var r=porAno[ano].r,d=porAno[ano].d,s=r-d;
    return'<div style="background:#fff;border-radius:12px;border:2px solid #5b3fa5;margin-bottom:10px;overflow:hidden;"><div style="background:#5b3fa5;padding:12px 16px;"><span style="color:#fff;font-size:15px;font-weight:500;">📅 Total '+ano+'</span></div><div style="padding:14px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"><div><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:4px;">Receitas</div><div style="font-size:16px;font-weight:500;color:#185FA5;">'+fmt(r)+'</div></div><div><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:4px;">Despesas</div><div style="font-size:16px;font-weight:500;color:#a32d2d;">'+fmt(d)+'</div></div><div><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:4px;">Saldo</div><div style="font-size:16px;font-weight:500;color:'+(s>=0?'#2d7a2d':'#a32d2d')+';">'+fmt(s)+'</div></div></div></div>';
  }).join('');
  var keys=Object.keys(grupos).sort(function(a,b){
    var am=grupos[a],bm=grupos[b];

  });
  var mesesHtml=keys.map(function(key){
    var g=grupos[key];

    var totalD=g.despesas.reduce(function(a,h){return a+h.total;},0);

    var recHtml='';
    if(g.receitas.length){
      recHtml+='<div style="font-size:11px;font-weight:500;color:#185FA5;text-transform:uppercase;margin:12px 0 6px;">📈 Receitas</div>';
      g.receitas.forEach(function(h){
        recHtml+='<div style="background:#f0f6ff;border-radius:8px;padding:8px 12px;margin-bottom:6px;">';
        (h.itens||[]).forEach(function(i){recHtml+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #dce8f8;"><span>'+i.desc+'</span><span style="font-weight:500;color:#185FA5">'+fmt(i.valor)+'</span></div>';});
        recHtml+='<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:500;color:#185FA5;padding-top:6px;"><span>Total</span><span>'+fmt(h.total)+'</span></div>';
        recHtml+='<div style="display:flex;gap:8px;margin-top:8px;"><button class="hist-del" style="color:#185FA5;border-color:#185FA5;" data-reabrir="'+h.id+'" data-tipo="receita" data-mes="'+h.mes+'" data-ano="'+h.ano+'">↩ Reabrir</button><button class="hist-del" data-remover="'+h.id+'">Remover</button></div></div>';
      });
    }
    var despHtml='';

      despHtml+='<div style="font-size:11px;font-weight:500;color:#a32d2d;text-transform:uppercase;margin:12px 0 6px;">📉 Despesas</div>';

        despHtml+='<div style="background:#fff5f5;border-radius:8px;padding:8px 12px;margin-bottom:6px;">';
        (h.itens||[]).forEach(function(i){
          var ce=i.cat?(CATS_EMOJI[i.cat]||'📦')+' '+i.cat:'';
          despHtml+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #f5dada;"><span>'+i.desc+(ce?'<span style="font-size:10px;color:#999;margin-left:6px;">'+ce+'</span>':'')+'</span><span style="font-weight:500;color:#a32d2d">'+fmt(i.valor)+'</span></div>';
        });

        despHtml+='<div style="display:flex;gap:8px;margin-top:8px;"><button class="hist-del" style="color:#e05c00;border-color:#e05c00;" data-reabrir="'+h.id+'" data-tipo="despesa" data-mes="'+h.mes+'" data-ano="'+h.ano+'">↩ Reabrir</button><button class="hist-del" data-remover="'+h.id+'">Remover</button></div></div>';

    return'<div style="background:#fff;border-radius:12px;border:1px solid #e5e5e5;margin-bottom:10px;overflow:hidden;">'

        +'<div><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:2px;">Receitas</div><div style="font-size:14px;font-weight:500;color:#185FA5;">'+fmt(totalR)+'</div></div>'
        +'<div><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:2px;">Despesas</div><div style="font-size:14px;font-weight:500;color:#a32d2d;">'+fmt(totalD)+'</div></div>'
        +'<div><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:2px;">Saldo</div><div style="font-size:14px;font-weight:500;color:'+(saldo>=0?'#2d7a2d':'#a32d2d')+';">'+fmt(saldo)+'</div></div>'
      +'</div>'
      +'<div id="hb-'+sk+'" style="display:none;padding:0 16px 14px;">'+recHtml+despHtml+'</div>'
    +'</div>';
  }).join('');
  el.innerHTML=anoHtml+'<div style="font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin:8px 0 8px;">Por mês</div>'+mesesHtml;
}

        +'<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-top:1px solid #f5f5f5;margin-top:2px;"><span style="color:#888;">Saldo</span><span style="font-weight:500;color:'+(saldo16>=0?'#2d7a2d':'#a32d2d')+';">'+fmt(saldo16)+'</span></div>'
      +'</div></div>';
      html+='<div><div style="background:#718096;padding:7px 14px;display:flex;justify-content:space-between;"><span style="color:#fff;font-size:12px;font-weight:500;">Dia 25</span><span style="color:#fff;font-size:12px;">'+fmt(saldo25)+'</span></div><div style="padding:8px 14px;">'
        +'<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;"><span style="color:#888;">Receita</span><span style="font-weight:500;">'+fmt(m.r25)+'</span></div>'
        +'<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;"><span style="color:#888;">Despesa</span><span style="font-weight:500;color:#a32d2d;">'+fmt(m.d25)+'</span></div>'
        +'<div style="display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-top:1px solid #f5f5f5;margin-top:2px;"><span style="color:#888;">Saldo</span><span style="font-weight:500;color:'+(saldo25>=0?'#2d7a2d':'#a32d2d')+';">'+fmt(saldo25)+'</span></div>'
      +'</div></div>';
      html+='</div></div></div>';
    });
  }
  document.getElementById('home-summary').innerHTML=html;
  var sel=document.getElementById('home-filtro-mes');
  if(sel) sel.addEventListener('change',function(){window.homeFiltroMes=this.value;renderHome();});
  var btnAll=document.getElementById('btn-toggle-all');
  if(btnAll) btnAll.addEventListener('click',function(){toggleAllMeses();});
  updateMeta();
}

function toggleMesHome(key){
  window.mesOpen[key]=!window.mesOpen[key];
  var body=document.getElementById('body-'+key);
  var arr=document.getElementById('arr-'+key);
  if(body) body.style.display=window.mesOpen[key]?'block':'none';
  if(arr) arr.textContent=window.mesOpen[key]?'▲':'▼';
  var anyOpen=Object.values(window.mesOpen).some(function(v){return v;});
  var btn=document.getElementById('btn-toggle-all');
  if(btn) btn.textContent=anyOpen?'⊟ Colapsar tudo':'⊞ Expandir tudo';
}

function toggleAllMeses(){
  var anyOpen=Object.values(window.mesOpen).some(function(v){return v;});
  var toOpen=!anyOpen;
  document.querySelectorAll('[id^="body-meskey-"]').forEach(function(b){
    var k=b.id.replace('body-','');
    window.mesOpen[k]=toOpen;
    b.style.display=toOpen?'block':'none';
  });
  document.querySelectorAll('[id^="arr-meskey-"]').forEach(function(a){a.textContent=toOpen?'▲':'▼';});
  var btn=document.getElementById('btn-toggle-all');
  if(btn) btn.textContent=toOpen?'⊟ Colapsar tudo':'⊞ Expandir tudo';
}

// Firebase listeners
db.collection('config').doc('meta').get().then(function(doc){
  if(doc.exists){
    var d=doc.data();
    if(d.meta) document.getElementById('r-meta').value=d.meta;
    if(d.taxaExtra) document.getElementById('r-taxa-extra').value=d.taxaExtra;
    if(d.metaMes&&document.getElementById('meta-mes')) document.getElementById('meta-mes').value=d.metaMes;
    updateMeta();

}).catch(function(){});

// Timeout de segurança: se em 8s nada carregou, mostra erro
var _carregouDados=false;
setTimeout(function(){
  if(!_carregouDados){
    setSynced(false);
    document.getElementById('home-summary').innerHTML='<div style="text-align:center;padding:2rem;color:#a32d2d;font-size:13px;">⚠️ Tempo esgotado ao conectar.<br><small>Verifique sua conexão ou as regras do Firestore.</small><br><br><button onclick="location.reload()" style="margin-top:8px;padding:8px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;">Recarregar</button></div>';
  }
},8000);

// Listeners em tempo real
db.collection('receitas').onSnapshot(function(snap){
  receitas=snap.docs.map(function(d){var data=d.data();data.id=d.id;return data;});
  receitas.sort(function(a,b){var ta=a.criadoEm?a.criadoEm.seconds:0,tb=b.criadoEm?b.criadoEm.seconds:0;return ta-tb;});
  _carregouDados=true;
  renderReceitas();renderHome();setSynced(true);
},function(err){console.error('receitas:',err);setSynced(false);});

db.collection('despesas').onSnapshot(function(snap){
  despesas=snap.docs.map(function(d){var data=d.data();data.id=d.id;return data;});
  despesas.sort(function(a,b){var ta=a.criadoEm?a.criadoEm.seconds:0,tb=b.criadoEm?b.criadoEm.seconds:0;return ta-tb;});
  _carregouDados=true;
  atualizarCategorias(despesas);
  renderDespesas();renderHome();setSynced(true);
},function(err){console.error('despesas:',err);setSynced(false);});

db.collection('historico').onSnapshot(function(snap){
  historico=snap.docs.map(function(d){var data=d.data();data.id=d.id;return data;});
  historico.sort(function(a,b){var ta=a.criadoEm?a.criadoEm.seconds:0,tb=b.criadoEm?b.criadoEm.seconds:0;return ta-tb;});
  _carregouDados=true;
  renderReceitas();renderDespesas();renderHome();setSynced(true);
},function(err){console.error('historico:',err);setSynced(false);});
</script>
