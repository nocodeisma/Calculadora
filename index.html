<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Finanças</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ee;color:#1a1a1a;min-height:100vh;}
.nav{background:#1a1a1a;display:flex;align-items:center;gap:10px;padding:0 16px;position:sticky;top:0;z-index:100;height:50px;}
.btn-back{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0;line-height:1;}
.nav-title{color:#fff;font-size:15px;font-weight:500;flex:1;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#888;flex-shrink:0;transition:background 0.3s;}
.sync-dot.ok{background:#4ade80;}.sync-dot.err{background:#f87171;}
.home{padding:1.5rem 1rem 2rem;}
.home-title{font-size:24px;font-weight:500;margin-bottom:4px;}
.home-sub{font-size:13px;color:#666;margin-bottom:1.5rem;}
.home-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.hbtn{border-radius:14px;padding:1.25rem;border:none;cursor:pointer;text-align:left;transition:transform 0.12s;width:100%;font-family:inherit;}
.hbtn:active{transform:scale(0.97);}
.hbtn-r{background:#185FA5;color:#fff;}.hbtn-d{background:#1a1a1a;color:#fff;}
.hbtn-h{background:#5b3fa5;color:#fff;width:100%;border-radius:14px;padding:1rem 1.25rem;border:none;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:12px;font-family:inherit;}
.hbtn-icon{font-size:22px;margin-bottom:8px;}
.hbtn-label{font-size:11px;opacity:0.7;text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:2px;}
.hbtn-title{font-size:16px;font-weight:500;}
.card{background:#fff;border-radius:12px;padding:14px;border:1px solid #e5e5e5;margin-bottom:12px;}
.card.full{grid-column:1/-1;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.slabel{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.04em;}
.sval{font-size:20px;font-weight:500;}
.sval.g{color:#2d7a2d;}.sval.r{color:#a32d2d;}.sval.b{color:#185FA5;}
.ssub{font-size:11px;color:#999;margin-top:2px;}
.prog-bg{height:8px;background:#f0f0ee;border-radius:99px;overflow:hidden;margin-top:8px;}
.prog-fill{height:100%;border-radius:99px;transition:width 0.4s;}
.day-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.day-card{border-radius:12px;overflow:hidden;border:1px solid #e5e5e5;}
.day-hdr{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.day-hdr-16{background:#185FA5;}.day-hdr-25{background:#BA7517;}
.day-hdr span{font-size:12px;font-weight:500;color:#fff;}
.day-body{background:#fff;padding:6px 0;}
.day-row{padding:5px 12px;display:flex;justify-content:space-between;font-size:11px;border-bottom:1px solid #f5f5f5;}
.day-row:last-child{border-bottom:none;}
.day-rl{color:#888;}.day-rv{font-weight:500;}
.day-rv.g{color:#2d7a2d;}.day-rv.r{color:#a32d2d;}
.chart-wrap{background:#fff;border-radius:12px;padding:14px;border:1px solid #e5e5e5;margin-bottom:12px;}
.chart-title{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:12px;}
.section{padding:0 1rem 2rem;}
.fcard{background:#fff;border-radius:12px;padding:1.25rem;margin-bottom:1rem;border:1px solid #e5e5e5;}
.ftitle{font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:14px;}
.field{margin-bottom:10px;}
label{font-size:12px;color:#666;display:block;margin-bottom:4px;}
input[type=text],input[type=number],select{width:100%;padding:9px 11px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#fafafa;color:#1a1a1a;font-family:inherit;outline:none;}
input:focus,select:focus{border-color:#999;box-shadow:0 0 0 3px rgba(0,0,0,0.06);}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.dtoggle{display:flex;gap:8px;margin-bottom:10px;}
.dbtn{flex:1;padding:9px;font-size:13px;font-weight:500;border:2px solid #ddd;border-radius:8px;background:#f5f5f3;color:#888;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.dbtn-16.sel{background:#185FA5;border-color:#0C447C;color:#fff;}
.dbtn-25.sel{background:#BA7517;border-color:#854F0B;color:#fff;}
.sub-prev{display:flex;align-items:center;justify-content:space-between;background:#f5f5f3;border-radius:8px;padding:10px 14px;margin-top:8px;}
.sub-prev span{font-size:12px;color:#666;}
.sub-prev strong{font-size:16px;font-weight:500;}
.btn-add{width:100%;padding:10px;font-size:14px;font-weight:500;border:none;border-radius:8px;color:#fff;cursor:pointer;font-family:inherit;margin-top:10px;}
.btn-add.r{background:#185FA5;}.btn-add.d{background:#1a1a1a;}
.btn-add:active{opacity:0.85;}.btn-add:disabled{opacity:0.5;cursor:not-allowed;}
.btn-fechar{width:100%;padding:11px;font-size:14px;font-weight:500;border:2px solid #5b3fa5;border-radius:8px;color:#5b3fa5;background:#fff;cursor:pointer;font-family:inherit;margin-top:8px;}
.btn-fechar:hover{background:#5b3fa5;color:#fff;}
.litem{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:0.9rem 1.1rem;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.lname{font-size:13px;font-weight:500;}
.lmeta{font-size:11px;color:#888;margin-top:2px;}
.badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;margin-left:5px;vertical-align:middle;}
.badge-16{background:#185FA5;color:#fff;}.badge-25{background:#BA7517;color:#fff;}
.lval{font-size:13px;font-weight:500;white-space:nowrap;}
.bdel{background:none;border:none;cursor:pointer;font-size:14px;color:#ccc;padding:0 0 0 6px;}
.bdel:hover{color:#e24b4a;}
.empty{text-align:center;padding:2rem;font-size:13px;color:#bbb;}
.dshdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:6px;font-size:13px;font-weight:500;color:#fff;}
.dshdr-16{background:#185FA5;}.dshdr-25{background:#BA7517;}
.dtotal-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#1a1a1a;border-radius:10px;margin-top:8px;font-size:14px;font-weight:500;color:#fff;}
.delta-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.dbox{border-radius:8px;padding:11px 14px;}
.dbox.n{background:#f5f5f3;}.dbox.p{background:#eaf3de;}.dbox.ng{background:#fcebeb;}
.dlabel{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;}
.dbox.n .dlabel,.dbox.n .dval,.dbox.n .dsub{color:#888;}
.dbox.p .dlabel,.dbox.p .dval,.dbox.p .dsub{color:#3b6d11;}
.dbox.ng .dlabel,.dbox.ng .dval,.dbox.ng .dsub{color:#a32d2d;}
.dval{font-size:15px;font-weight:500;}.dsub{font-size:10px;margin-top:2px;}
.hist-del{background:none;border:1px solid #e5e5e5;border-radius:6px;padding:4px 10px;font-size:11px;color:#888;cursor:pointer;margin-top:10px;font-family:inherit;}
.hist-del:hover{border-color:#e24b4a;color:#e24b4a;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;}
.modal-box{background:#fff;border-radius:16px 16px 0 0;padding:1.5rem 1rem;width:100%;}
.modal-title{font-size:16px;font-weight:500;margin-bottom:6px;}
.modal-sub{font-size:13px;color:#666;margin-bottom:1.25rem;}
.modal-actions{display:flex;gap:10px;margin-top:1rem;}
.mbtn{flex:1;padding:11px;font-size:14px;font-weight:500;border-radius:8px;cursor:pointer;font-family:inherit;border:none;}
.mbtn-c{background:#f0f0ee;color:#666;}.mbtn-ok{background:#5b3fa5;color:#fff;}
.loading{text-align:center;padding:2rem;font-size:13px;color:#888;}
.hidden{display:none!important;}
/* Categoria bar */
.cat-bar-wrap{margin-bottom:4px;}
.cat-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.cat-bar-label{font-size:12px;color:#1a1a1a;min-width:90px;}
.cat-bar-bg{flex:1;height:8px;background:#f0f0ee;border-radius:99px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:99px;}
.cat-bar-val{font-size:11px;color:#888;min-width:80px;text-align:right;}
</style>
</head>
<body>

<div class="nav">
  <button class="btn-back hidden" id="btn-back" onclick="goTo('home')">←</button>
  <span class="nav-title" id="nav-title">💰 Finanças</span>
  <div class="sync-dot" id="sync-dot"></div>
</div>

<!-- HOME -->
<div id="page-home" class="home">
  <div class="home-title">Olá 👋</div>
  <div class="home-sub">Gerencie suas receitas e despesas</div>
  <div class="home-btns">
    <button class="hbtn hbtn-r" onclick="goTo('receita')">
      <div class="hbtn-icon">📈</div>
      <span class="hbtn-label">Entradas</span>
      <div class="hbtn-title">Receitas</div>
    </button>
    <button class="hbtn hbtn-d" onclick="goTo('despesa')">
      <div class="hbtn-icon">📉</div>
      <span class="hbtn-label">Saídas</span>
      <div class="hbtn-title">Despesas</div>
    </button>
  </div>
  <button class="hbtn-h" onclick="goTo('historico')">
    <span style="font-size:20px;">📋</span>
    <div><span class="hbtn-label">Meses fechados</span><div class="hbtn-title">Histórico</div></div>
  </button>
  <!-- META -->
  <div class="fcard" style="margin-bottom:12px;">
    <div class="ftitle">Meta e hora extra</div>
    <div class="grid2">
      <div><label>Meta (R$)</label><input type="number" id="r-meta" placeholder="40000" min="0" step="100" oninput="saveMeta()"/></div>
      <div><label>Taxa hora extra (R$)</label><input type="number" id="r-taxa-extra" placeholder="160" min="0" step="0.01" oninput="saveMeta()"/></div>
    </div>
    <div id="r-delta-row" style="display:none;">
      <div class="delta-row">
        <div class="dbox n"><div class="dlabel">Meta</div><div class="dval" id="r-val-meta">—</div></div>
        <div class="dbox n" id="r-box-delta"><div class="dlabel">Delta</div><div class="dval" id="r-val-delta">—</div><div class="dsub" id="r-sub-delta">—</div></div>
        <div class="dbox n" id="r-box-extra"><div class="dlabel">Horas extras</div><div class="dval" id="r-val-extra">—</div><div class="dsub" id="r-sub-extra">—</div></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px;"><span>Progresso da meta</span><span id="r-pct-label">0%</span></div>
      <div style="height:10px;background:#f0f0ee;border-radius:99px;overflow:hidden;margin-bottom:4px;"><div id="r-pct-bar" style="height:100%;border-radius:99px;transition:width 0.4s;width:0%;background:#185FA5;"></div></div>
    </div>
  </div>
  <div id="home-summary"><div class="loading">Carregando...</div></div>
</div>

<!-- RECEITAS -->
<div id="page-receita" class="section hidden">
  <div style="height:1rem"></div>
  <div class="fcard">
    <div class="ftitle">Novo projeto</div>
    <div class="field"><label>Descrição</label><input type="text" id="r-desc" placeholder="Ex: Desenvolvimento site XYZ"/></div>
    <div class="grid3">
      <div><label>Taxa/hora (R$)</label><input type="number" id="r-taxa" placeholder="150" min="0" step="0.01" oninput="recalcPreview()"/></div>
      <div><label>Horas/dia</label><input type="number" id="r-horas" placeholder="8" min="0" step="0.5" oninput="recalcPreview()"/></div>
      <div><label>Dias úteis</label><input type="number" id="r-dias" placeholder="22" min="0" step="1" oninput="recalcPreview()"/></div>
    </div>
    <div class="grid2">
      <div><label>Mês</label>
        <select id="r-mes"><option value="">-- Mês --</option>
          <option>Janeiro</option><option>Fevereiro</option><option>Março</option><option>Abril</option>
          <option>Maio</option><option>Junho</option><option>Julho</option><option>Agosto</option>
          <option>Setembro</option><option>Outubro</option><option>Novembro</option><option>Dezembro</option>
        </select>
      </div>
      <div><label>Ano</label><input type="number" id="r-ano" placeholder="2026" min="2020" max="2099"/></div>
    </div>
    <label>Data de pagamento</label>
    <div class="dtoggle">
      <button class="dbtn dbtn-16 sel" id="r-btn16" onclick="selDate('r',16)">Dia 16</button>
      <button class="dbtn dbtn-25" id="r-btn25" onclick="selDate('r',25)">Dia 25</button>
    </div>
    <div class="sub-prev"><span>Subtotal estimado</span><strong id="r-preview">R$ 0,00</strong></div>
    <button class="btn-add r" id="r-btn-add" onclick="addReceita()">+ Adicionar receita</button>
  </div>
  <div id="r-list"><div class="loading">Carregando...</div></div>
  <div style="padding:0 0 1rem;">
    <button class="btn-fechar" onclick="abrirModal('receita')">📋 Fechar mês — Receitas</button>
  </div>
</div>

<!-- DESPESAS -->
<div id="page-despesa" class="section hidden">
  <div style="height:1rem"></div>
  <div class="fcard">
    <div class="ftitle">Nova despesa</div>
    <div class="field"><label>Descrição</label><input type="text" id="d-desc" placeholder="Ex: Aluguel, Conta de luz..."/></div>
    <div class="field"><label>Categoria</label>
      <select id="d-cat">
        <option value="">-- Selecione --</option>
        <option value="Moradia">🏠 Moradia (aluguel, condomínio, IPTU)</option>
        <option value="Saúde">❤️ Saúde (plano, dentista, farmácia)</option>
        <option value="Transporte">🚗 Transporte (carro, seguro, combustível)</option>
        <option value="Educação">📚 Educação (escola, curso, FIES)</option>
        <option value="Alimentação">🍽️ Alimentação (mercado, restaurante)</option>
        <option value="Pessoal">👤 Pessoal (roupas, higiene, lazer)</option>
        <option value="Financeiro">💳 Financeiro (cartão, imposto, parcela)</option>
        <option value="Família">👨‍👩‍👧 Família (babá, mesada, presentes)</option>
        <option value="Serviços">⚡ Serviços (internet, água, luz, contabilidade)</option>
        <option value="Outros">📦 Outros</option>
      </select>
    </div>
    <div class="field"><label>Valor (R$)</label><input type="number" id="d-valor" placeholder="0,00" min="0" step="0.01"/></div>
    <div class="grid2">
      <div><label>Mês</label>
        <select id="d-mes"><option value="">-- Mês --</option>
          <option>Janeiro</option><option>Fevereiro</option><option>Março</option><option>Abril</option>
          <option>Maio</option><option>Junho</option><option>Julho</option><option>Agosto</option>
          <option>Setembro</option><option>Outubro</option><option>Novembro</option><option>Dezembro</option>
        </select>
      </div>
      <div><label>Ano</label><input type="number" id="d-ano" placeholder="2026" min="2020" max="2099"/></div>
    </div>
    <label>Data de pagamento</label>
    <div class="dtoggle">
      <button class="dbtn dbtn-16 sel" id="d-btn16" onclick="selDate('d',16)">Dia 16</button>
      <button class="dbtn dbtn-25" id="d-btn25" onclick="selDate('d',25)">Dia 25</button>
    </div>
    <button class="btn-add d" id="d-btn-add" onclick="addDespesa()">+ Adicionar despesa</button>
  </div>
  <div id="d-list"><div class="loading">Carregando...</div></div>
  <div id="d-fechar-wrap" class="hidden" style="padding:0 0 1rem;">
    <button class="btn-fechar" onclick="abrirModal('despesa')">📋 Fechar mês — Despesas</button>
  </div>
</div>

<!-- HISTÓRICO -->
<div id="page-historico" class="section hidden">
  <div style="height:1rem"></div>
  <div id="hist-list"><div class="loading">Carregando...</div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-title" id="modal-title">Fechar mês</div>
    <div class="modal-sub" id="modal-sub">Selecione o mês de referência.</div>
    <div class="grid2">
      <div><label>Mês</label>
        <select id="modal-mes"><option value="">-- Mês --</option>
          <option>Janeiro</option><option>Fevereiro</option><option>Março</option><option>Abril</option>
          <option>Maio</option><option>Junho</option><option>Julho</option><option>Agosto</option>
          <option>Setembro</option><option>Outubro</option><option>Novembro</option><option>Dezembro</option>
        </select>
      </div>
      <div><label>Ano</label><input type="number" id="modal-ano" placeholder="2026" min="2020" max="2099" value="2026"/></div>
    </div>
    <div class="modal-actions">
      <button class="mbtn mbtn-c" onclick="fecharModal()">Cancelar</button>
      <button class="mbtn mbtn-ok" id="modal-confirm-btn" onclick="confirmarFechamento()">Confirmar</button>
    </div>
  </div>
</div>

<script>
var firebaseConfig={
  apiKey:"AIzaSyD_t1nhaoYlqTjOehAaGJyNpPfNt7Uv92g",
  authDomain:"financeiro-f8dda.firebaseapp.com",
  projectId:"financeiro-f8dda",
  storageBucket:"financeiro-f8dda.firebasestorage.app",
  messagingSenderId:"210397672861",
  appId:"1:210397672861:web:d5f6a6207b26f4b95aeb74"
};
firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();

var receitas=[],despesas=[],historico=[],rDate=16,dDate=16,modalTipo='',viewMode='dia',saveMetaTimer=null;

var CATS_EMOJI={Moradia:'🏠',Saúde:'❤️',Transporte:'🚗',Educação:'📚',Alimentação:'🍽️',Pessoal:'👤',Financeiro:'💳',Família:'👨‍👩‍👧',Serviços:'⚡',Outros:'📦'};
var CAT_ORDER=['Moradia','Saúde','Transporte','Educação','Alimentação','Pessoal','Financeiro','Família','Serviços','Outros'];
var CAT_COLORS={Moradia:'#4a5568',Saúde:'#718096',Transporte:'#a0aec0',Educação:'#2d3748',Alimentação:'#606978',Pessoal:'#8a9bb0',Financeiro:'#1a202c',Família:'#697080',Serviços:'#556275',Outros:'#b0bcc8'};

// Mapeamento automático de categorias para despesas existentes
var CAT_MAP={
  'Saúde':'Saúde','FIES':'Educação','Dentista':'Saúde','Seguro carro':'Transporte',
  'Água':'Serviços','Carro':'Transporte','Contabilidade':'Financeiro','Mãe':'Outros',
  'Nubank Isma':'Financeiro','Baba salário':'Família','Baba faxina':'Família',
  'Internet':'Serviços','Cartão inter':'Financeiro','Aluguel':'Moradia',
  'Imposto':'Financeiro','Aniver Isaac':'Família','Parcela c&a':'Pessoal',
  'Cartão mãe nu':'Financeiro','Cartão mãe nubank':'Financeiro'
};

function setSynced(ok){document.getElementById('sync-dot').className='sync-dot '+(ok?'ok':'err');}
function fmt(v){return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function calcSub(t,h,d){return(parseFloat(t)||0)*(parseFloat(h)||0)*(parseFloat(d)||0);}
function getTotalR(){return receitas.reduce(function(a,p){return a+p.sub;},0);}
function getTotalD(){return despesas.reduce(function(a,p){return a+p.valor;},0);}
function getCat(p){return p.cat||(CAT_MAP[p.desc]||'Outros');}

// Atualizar categorias no Firebase para despesas sem categoria
function atualizarCategorias(lista){
  lista.forEach(function(p){
    if(!p.cat&&CAT_MAP[p.desc]){
      db.collection('despesas').doc(p.id).update({cat:CAT_MAP[p.desc]}).catch(function(){});
    }
  });
}

window.catOpen={};
function toggleCat(key){
  window.catOpen[key]=!window.catOpen[key];
  var body=document.getElementById('body-'+key);
  var arr=document.getElementById('arr-'+key);
  if(body){body.style.display=window.catOpen[key]?'block':'none';}
  if(arr){arr.textContent=window.catOpen[key]?'▲':'▼';}
}

function goTo(page){
  ['home','receita','despesa','historico'].forEach(function(p){document.getElementById('page-'+p).classList.add('hidden');});
  document.getElementById('page-'+page).classList.remove('hidden');
  var back=document.getElementById('btn-back');
  var titles={home:'💰 Finanças',receita:'📈 Receitas',despesa:'📉 Despesas',historico:'📋 Histórico'};
  document.getElementById('nav-title').textContent=titles[page];
  if(page==='home'){back.classList.add('hidden');renderHome();}
  else{back.classList.remove('hidden');}
  if(page==='historico') renderHistorico();
}

function selDate(p,d){
  if(p==='r') rDate=d; else dDate=d;
  document.getElementById(p+'-btn16').className='dbtn dbtn-16'+(d===16?' sel':'');
  document.getElementById(p+'-btn25').className='dbtn dbtn-25'+(d===25?' sel':'');
}

function recalcPreview(){
  document.getElementById('r-preview').textContent=fmt(calcSub(
    document.getElementById('r-taxa').value,
    document.getElementById('r-horas').value,
    document.getElementById('r-dias').value
  ));
}

function saveMeta(){
  updateMeta();
  clearTimeout(saveMetaTimer);
  saveMetaTimer=setTimeout(function(){
    var meta=parseFloat(document.getElementById('r-meta').value)||0;
    var taxaExtra=parseFloat(document.getElementById('r-taxa-extra').value)||0;
    db.collection('config').doc('meta').set({meta:meta,taxaExtra:taxaExtra})
    .then(function(){setSynced(true);}).catch(function(){setSynced(false);});
  },800);
}

function updateMeta(){
  var meta=parseFloat(document.getElementById('r-meta').value)||0;
  var taxaExtra=parseFloat(document.getElementById('r-taxa-extra').value)||0;
  var total=getTotalR();
  var dr=document.getElementById('r-delta-row');
  if(!meta){dr.style.display='none';return;}
  dr.style.display='block';
  var delta=meta-total,atingiu=delta<=0;
  var pct=Math.min(100,(total/meta*100));
  document.getElementById('r-val-meta').textContent=fmt(meta);
  document.getElementById('r-box-delta').className='dbox '+(atingiu?'p':'ng');
  document.getElementById('r-val-delta').textContent=fmt(Math.abs(delta));
  document.getElementById('r-sub-delta').textContent=atingiu?'acima da meta':'faltando';
  document.getElementById('r-pct-label').textContent=pct.toFixed(1)+'%';
  var bar=document.getElementById('r-pct-bar');
  bar.style.width=pct.toFixed(1)+'%';
  bar.style.background=atingiu?'#2d7a2d':(pct>=75?'#BA7517':'#185FA5');
  var bx=document.getElementById('r-box-extra');
  if(!atingiu&&taxaExtra>0){bx.className='dbox ng';document.getElementById('r-val-extra').textContent=(delta/taxaExtra).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+'h';document.getElementById('r-sub-extra').textContent='a R$'+taxaExtra.toLocaleString('pt-BR',{minimumFractionDigits:2})+'/h';}
  else if(atingiu){bx.className='dbox p';document.getElementById('r-val-extra').textContent='Meta atingida';document.getElementById('r-sub-extra').textContent='';}
  else{bx.className='dbox n';document.getElementById('r-val-extra').textContent='—';document.getElementById('r-sub-extra').textContent='informe taxa extra';}
}

function addReceita(){
  var desc=document.getElementById('r-desc').value.trim();
  var taxa=parseFloat(document.getElementById('r-taxa').value)||0;
  var horas=parseFloat(document.getElementById('r-horas').value)||0;
  var dias=parseInt(document.getElementById('r-dias').value)||0;
  var mes=document.getElementById('r-mes').value;
  var ano=document.getElementById('r-ano').value;
  if(!desc){document.getElementById('r-desc').focus();return;}
  if(!taxa||!horas||!dias)return;
  var btn=document.getElementById('r-btn-add');btn.disabled=true;
  db.collection('receitas').add({desc:desc,taxa:taxa,horas:horas,dias:dias,sub:calcSub(taxa,horas,dias),date:rDate,mes:mes,ano:ano,criadoEm:firebase.firestore.FieldValue.serverTimestamp()})
  .then(function(){
    ['r-desc','r-taxa','r-horas','r-dias'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('r-preview').textContent='R$ 0,00';
    document.getElementById('r-desc').focus();setSynced(true);
  }).catch(function(e){setSynced(false);alert('Erro: '+e.message);})
  .finally(function(){btn.disabled=false;});
}

function addDespesa(){
  var desc=document.getElementById('d-desc').value.trim();
  var cat=document.getElementById('d-cat').value||'Outros';
  var valor=parseFloat(document.getElementById('d-valor').value)||0;
  var mes=document.getElementById('d-mes').value;
  var ano=document.getElementById('d-ano').value;
  if(!desc){document.getElementById('d-desc').focus();return;}
  if(!valor)return;
  var btn=document.getElementById('d-btn-add');btn.disabled=true;
  db.collection('despesas').add({desc:desc,cat:cat,valor:valor,date:dDate,mes:mes,ano:ano,criadoEm:firebase.firestore.FieldValue.serverTimestamp()})
  .then(function(){
    ['d-desc','d-valor'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('d-cat').value='';
    document.getElementById('d-desc').focus();setSynced(true);
  }).catch(function(e){setSynced(false);alert('Erro: '+e.message);})
  .finally(function(){btn.disabled=false;});
}

function removeReceita(id){db.collection('receitas').doc(id).delete().then(function(){setSynced(true);}).catch(function(){setSynced(false);});}
function removeDespesa(id){db.collection('despesas').doc(id).delete().then(function(){setSynced(true);}).catch(function(){setSynced(false);});}
function removeHistorico(id){
  if(!confirm('Remover este mês do histórico?'))return;
  db.collection('historico').doc(id).delete().then(function(){setSynced(true);renderHistorico();}).catch(function(){setSynced(false);});

function abrirModal(tipo){
  modalTipo=tipo;
  document.getElementById('modal-title').textContent=tipo==='receita'?'Fechar mês — Receitas':'Fechar mês — Despesas';
  document.getElementById('modal-sub').textContent='Todos os lançamentos de '+(tipo==='receita'?'receitas':'despesas')+' serão copiados para o histórico.';
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function fecharModal(){document.getElementById('modal-overlay').classList.add('hidden');}

function confirmarFechamento(){
  var mes=document.getElementById('modal-mes').value;
  var ano=document.getElementById('modal-ano').value;
  if(!mes||!ano){alert('Selecione mês e ano.');return;}
  var btn=document.getElementById('modal-confirm-btn');btn.disabled=true;
  var itens=modalTipo==='receita'
    ?receitas.map(function(p){return{desc:p.desc,valor:p.sub,taxa:p.taxa,horas:p.horas,dias:p.dias,date:p.date};})
    :despesas.map(function(p){return{desc:p.desc,cat:getCat(p),valor:p.valor,date:p.date};});
  var total=itens.reduce(function(a,p){return a+p.valor;},0);
  db.collection('historico').add({tipo:modalTipo,mes:mes,ano:ano,itens:itens,total:total,criadoEm:firebase.firestore.FieldValue.serverTimestamp()})
  .then(function(){setSynced(true);fecharModal();alert('Mês fechado! Veja em Histórico.');})

function renderHistorico(){
  var el=document.getElementById('hist-list');

    var key=h.mes+'|'+h.ano;
    if(!grupos[key])grupos[key]={mes:h.mes,ano:h.ano,receitas:[],despesas:[]};

  });
  var anosOrd=Object.keys(porAno).sort(function(a,b){return parseInt(b)-parseInt(a);});
  var anoHtml=anosOrd.map(function(ano){
    var r=porAno[ano].r,d=porAno[ano].d,s=r-d;
    return'<div style="background:#fff;border-radius:12px;border:2px solid #5b3fa5;margin-bottom:10px;overflow:hidden;"><div style="background:#5b3fa5;padding:12px 16px;"><span style="color:#fff;font-size:15px;font-weight:500;">📅 Total '+ano+'</span></div><div style="padding:14px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;"><div><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:4px;">Receitas</div><div style="font-size:16px;font-weight:500;color:#185FA5;">'+fmt(r)+'</div></div><div><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:4px;">Despesas</div><div style="font-size:16px;font-weight:500;color:#a32d2d;">'+fmt(d)+'</div></div><div><div style="font-size:10px;color:#888;text-transform:uppercase;margin-bottom:4px;">Saldo</div><div style="font-size:16px;font-weight:500;color:'+(s>=0?'#2d7a2d':'#a32d2d')+';">'+fmt(s)+'</div></div></div></div>';
  }).join('');
  var keys=Object.keys(grupos).sort(function(a,b){
    var am=grupos[a],bm=grupos[b];

  });
  var mesesHtml=keys.map(function(key){

        recHtml+='<div style="background:#f0f6ff;border-radius:8px;padding:8px 12px;margin-bottom:6px;">';
        (h.itens||[]).forEach(function(i){recHtml+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #dce8f8;"><span>'+i.desc+'</span><span style="font-weight:500;color:#185FA5">'+fmt(i.valor)+'</span></div>';});
        recHtml+='<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:500;color:#185FA5;padding-top:6px;"><span>Total</span><span>'+fmt(h.total)+'</span></div>';
        recHtml+='<button class="hist-del" onclick="removeHistorico(\''+h.id+'\')">Remover</button></div>';
      });
    }
    var despHtml='';
    if(g.despesas.length){
      despHtml+='<div style="font-size:11px;font-weight:500;color:#a32d2d;text-transform:uppercase;margin:12px 0 6px;">📉 Despesas</div>';
      g.despesas.forEach(function(h){
        despHtml+='<div style="background:#fff5f5;border-radius:8px;padding:8px 12px;margin-bottom:6px;">';
        (h.itens||[]).forEach(function(i){
          var ce=i.cat?(CATS_EMOJI[i.cat]||'📦')+' '+i.cat:'';
          despHtml+='<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #f5dada;"><span>'+i.desc+(ce?'<span style="font-size:10px;color:#999;margin-left:6px;">'+ce+'</span>':'')+'</span><span style="font-weight:500;color:#a32d2d">'+fmt(i.valor)+'</span></div>';
        });
        despHtml+='<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:500;color:#a32d2d;padding-top:6px;"><span>Total</span><span>'+fmt(h.total)+'</span></div>';

      +'</div>'

    +'</div>';
  }).join('');
  el.innerHTML=anoHtml+'<div style="font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin:8px 0 8px;">Por mês</div>'+mesesHtml;

function buildDonutChart(grupos,total){
  if(!total) return '';
  var cx=100,cy=100,r=75,inner=45;
  var slices='',start=0;
  var legendHtml='';
  CAT_ORDER.forEach(function(cat){
    if(!grupos[cat]) return;
    var tot=grupos[cat].reduce(function(a,p){return a+p.valor;},0);
    var pct=tot/total;
    if(pct<=0) return;
    var cor=CAT_COLORS[cat]||'#888';
    var a1=start*2*Math.PI, a2=(start+pct)*2*Math.PI;
    var x1=cx+r*Math.sin(a1),y1=cy-r*Math.cos(a1);
    var x2=cx+r*Math.sin(a2),y2=cy-r*Math.cos(a2);
    var xi1=cx+inner*Math.sin(a1),yi1=cy-inner*Math.cos(a1);
    var xi2=cx+inner*Math.sin(a2),yi2=cy-inner*Math.cos(a2);
    var lg=pct>0.5?1:0;
    if(pct>=1){
      slices+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+cor+'"/>';
      slices+='<circle cx="'+cx+'" cy="'+cy+'" r="'+inner+'" fill="#fff"/>';
    } else {
      slices+='<path d="M'+x1+','+y1+' A'+r+','+r+' 0 '+lg+',1 '+x2+','+y2+' L'+xi2+','+yi2+' A'+inner+','+inner+' 0 '+lg+',0 '+xi1+','+yi1+' Z" fill="'+cor+'"/>';
    }
    start+=pct;
    var emoji=CATS_EMOJI[cat]||'📦';
    legendHtml+='<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #f5f5f5;">'
      +'<div style="display:flex;align-items:center;gap:8px;">'
        +'<div style="width:10px;height:10px;border-radius:2px;background:'+cor+';flex-shrink:0;"></div>'
        +'<span style="font-size:12px;">'+emoji+' '+cat+'</span>'
      +'</div>'
      +'<div style="text-align:right;">'
        +'<span style="font-size:12px;font-weight:500;color:#1a1a1a;">'+fmt(tot)+'</span>'
        +'<span style="font-size:11px;color:#888;margin-left:6px;">'+(pct*100).toFixed(1)+'%</span>'
      +'</div>'
    +'</div>';
  });
  return '<div class="chart-wrap"><div class="chart-title">Despesas por categoria</div>'
    +'<div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;">'
      +'<svg viewBox="0 0 200 200" style="width:140px;height:140px;flex-shrink:0;">'
        +slices
        +'<circle cx="'+cx+'" cy="'+cy+'" r="'+inner+'" fill="#fff"/>'
        +'<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" style="font-size:13px;font-weight:600;fill:#1a1a1a;">'+fmt(total).replace('R$\u00a0','R$ ')+'</text>'
        +'<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" style="font-size:9px;fill:#888;">TOTAL</text>'
      +'</svg>'
      +'<div style="flex:1;min-width:160px;">'+legendHtml+'</div>'
    +'</div>'
  +'</div>';
}

function renderHome(){
  var totalR=getTotalR(),totalD=getTotalD(),saldo=totalR-totalD;
  var r16=receitas.filter(function(p){return p.date===16;}).reduce(function(a,p){return a+p.sub;},0);
  var r25=receitas.filter(function(p){return p.date===25;}).reduce(function(a,p){return a+p.sub;},0);
  var d16=despesas.filter(function(p){return p.date===16;}).reduce(function(a,p){return a+p.valor;},0);
  var d25=despesas.filter(function(p){return p.date===25;}).reduce(function(a,p){return a+p.valor;},0);
  var pctD=totalR>0?Math.min(100,(totalD/totalR)*100):0;
  if(!totalR&&!totalD){document.getElementById('home-summary').innerHTML='<div class="empty" style="background:#fff;border-radius:12px;border:1px solid #e5e5e5">Adicione receitas e despesas para ver o resumo.</div>';return;}

  // Gráfico rosca receitas vs despesas
  var total2=totalR+totalD;
  var pizzaHtml='';
  if(total2>0){
    var cx=100,cy=100,rv=80;
    function slice2(start,val,color){
      if(val<=0)return'';var pct=val/total2;
      if(pct>=1)return'<circle cx="'+cx+'" cy="'+cy+'" r="'+rv+'" fill="'+color+'"/>';
      var a=start*2*Math.PI,b=(start+pct)*2*Math.PI;
      var x1=cx+rv*Math.sin(a),y1=cy-rv*Math.cos(a),x2=cx+rv*Math.sin(b),y2=cy-rv*Math.cos(b);
      return'<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+rv+','+rv+' 0 '+(pct>0.5?1:0)+',1 '+x2+','+y2+' Z" fill="'+color+'"/>';
    }
    pizzaHtml='<div class="chart-wrap"><div class="chart-title">Receitas vs Despesas</div>'
      +'<div style="display:flex;align-items:center;gap:16px">'
        +'<svg viewBox="0 0 200 200" style="width:130px;height:130px;flex-shrink:0">'+slice2(0,totalR,'#185FA5')+slice2(totalR/total2,totalD,'#a32d2d')+'<circle cx="'+cx+'" cy="'+cy+'" r="40" fill="#fff"/></svg>'
        +'<div style="flex:1;display:flex;flex-direction:column;gap:12px">'
          +'<div><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><div style="width:10px;height:10px;border-radius:2px;background:#185FA5"></div><span style="font-size:11px;color:#888">Receitas</span></div><div style="font-size:14px;font-weight:500">'+fmt(totalR)+'</div><div style="font-size:11px;color:#888">'+(totalR/total2*100).toFixed(1)+'%</div></div>'
          +'<div><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><div style="width:10px;height:10px;border-radius:2px;background:#a32d2d"></div><span style="font-size:11px;color:#888">Despesas</span></div><div style="font-size:14px;font-weight:500;color:#a32d2d">'+fmt(totalD)+'</div><div style="font-size:11px;color:#888">'+(totalD/total2*100).toFixed(1)+'%</div></div>'
        +'</div>'
      +'</div></div>';
  }

  // Gráfico rosca por categoria
  var grupos={};
  despesas.forEach(function(p){var c=getCat(p);if(!grupos[c])grupos[c]=[];grupos[c].push(p);});
  var donutHtml=buildDonutChart(grupos,totalD);

  document.getElementById('home-summary').innerHTML=
    '<div class="sgrid">'
      +'<div class="card"><div class="slabel">Receitas</div><div class="sval b">'+fmt(totalR)+'</div><div class="ssub">'+receitas.length+' projeto'+(receitas.length!==1?'s':'')+'</div></div>'
      +'<div class="card"><div class="slabel">Despesas</div><div class="sval r">'+fmt(totalD)+'</div><div class="ssub">'+despesas.length+' item'+(despesas.length!==1?'s':'')+'</div></div>'
      +'<div class="card full"><div class="slabel">Saldo</div><div class="sval '+(saldo>=0?'g':'r')+'">'+fmt(saldo)+'</div>'
        +'<div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-top:8px;margin-bottom:4px;"><span>Despesas vs receita</span><span>'+pctD.toFixed(1)+'%</span></div>'
        +'<div class="prog-bg"><div class="prog-fill" style="width:'+pctD.toFixed(1)+'%;background:'+(pctD>80?'#a32d2d':pctD>50?'#BA7517':'#2d7a2d')+'"></div></div>'
      +'</div>'
    +'</div>'
    +pizzaHtml
    +donutHtml
    +'<div class="day-split">'
      +'<div class="day-card"><div class="day-hdr day-hdr-16"><span>Dia 16</span><span>'+fmt(r16-d16)+'</span></div><div class="day-body">'
        +'<div class="day-row"><span class="day-rl">Receita</span><span class="day-rv">'+fmt(r16)+'</span></div>'
        +'<div class="day-row"><span class="day-rl">Despesa</span><span class="day-rv r">'+fmt(d16)+'</span></div>'
        +'<div class="day-row"><span class="day-rl">Saldo</span><span class="day-rv '+((r16-d16)>=0?'g':'r')+'">'+fmt(r16-d16)+'</span></div>'
      +'</div></div>'
      +'<div class="day-card"><div class="day-hdr day-hdr-25"><span>Dia 25</span><span>'+fmt(r25-d25)+'</span></div><div class="day-body">'
        +'<div class="day-row"><span class="day-rl">Receita</span><span class="day-rv">'+fmt(r25)+'</span></div>'
        +'<div class="day-row"><span class="day-rl">Despesa</span><span class="day-rv r">'+fmt(d25)+'</span></div>'
        +'<div class="day-row"><span class="day-rl">Saldo</span><span class="day-rv '+((r25-d25)>=0?'g':'r')+'">'+fmt(r25-d25)+'</span></div>'
      +'</div></div>'
    +'</div>';
  updateMeta();
}

// Firebase listeners
db.collection('config').doc('meta').onSnapshot(function(doc){
  if(doc.exists){
    var d=doc.data();
    if(d.meta) document.getElementById('r-meta').value=d.meta;
    if(d.taxaExtra) document.getElementById('r-taxa-extra').value=d.taxaExtra;
    updateMeta();
  }
},function(){});

db.collection('receitas').orderBy('criadoEm','asc').onSnapshot(function(snap){
  receitas=snap.docs.map(function(d){var data=d.data();data.id=d.id;return data;});
  renderReceitas();renderHome();setSynced(true);
},function(){setSynced(false);});

db.collection('despesas').orderBy('criadoEm','asc').onSnapshot(function(snap){
  despesas=snap.docs.map(function(d){var data=d.data();data.id=d.id;return data;});
  atualizarCategorias(despesas); // Atualiza categorias das despesas existentes
  renderDespesas();renderHome();setSynced(true);
},function(){setSynced(false);});

db.collection('historico').orderBy('criadoEm','asc').onSnapshot(function(snap){
  historico=snap.docs.map(function(d){var data=d.data();data.id=d.id;return data;});
  setSynced(true);
},function(){setSynced(false);});
</script>
</body>
</html>
